plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Lecture schedule configuration
lect_repo: https://github.com/ucsb-cs24-s26/cs24-s26-lectures
start_week: 1
start_date: 2026-03-30        # First day of instruction
dates_based_on: 2026-03-30   # Assignment dates currently use this quarter's start; updated by sync_dates.rb
num_weeks: 10
extra_exam_week: true
lecture_days: [1, 3]  # 1=Monday, 3=Wednesday (use [2, 4] for Tue/Thu)
holidays:
  - date: "2026-05-25"
    desc: "Memorial Day"

remote_theme: ucsb-cs-course-repos/course-repo-jekyll-theme
#remote_theme: pmarsceill/just-the-docs@v0.3.3
url: https://ucsb-cs24.github.io/s26
baseurl: "/s26"
instructor: "Diba Mirza"
name: "CS24 Spring 2026"
course: "CS24"
course_title: "Problem Solving with Computers II"
title: "UCSB CS24 s26"
github_url: https://github.com/ucsb-cs24/s26
qtr: "s26"
quarter: "Spring 2026"
lecture_times: "MW 12:30a - 1:45p"
lecture_location: "EMBARHALL"
office_hours: "T: noon - 1p, R: 11a - noon, HFH 2119"
lab_times: "R: 10a - 10:50a , 1p - 1:50p , 2p - 2:50p, Phelps 3525" 
tas: "Sarah Canto Hyatt and Guanyu Yao"
ulas: "Nikhil Kapasi, Olivia Chen, Christian Kantchev"
class_org:
   name: ucsb-cs24-s26
   url: https://github.com/ucsb-cs24-s26
   githublinker: CS24 s26


instructor_url: https://ucsb-cs24.github.io/instructor

cal_dates: >
  [
  {"label":"First day of classes", "date":"2026-03-30" },
  {"label":"Drop deadline (no W grade)","date":"2026-04-24" },
  {"label":"Memorial Day - No lecture", "date":"2026-05-25" },
  {"label":"Presidents Day - No lecture", "date":"2026-02-16" },
  {"label":"s26 Instruction Ends", "date":"2026-06-05" },
  {"label":"Final Exam", "date":"2026-06-09" },
  {"label":"s26 Quarter Ends", "date":"2026-03-20" }
  ]

kramdown:
   parse_block_html: true

exclude:
   - vendor
include:
  - _pages

timezone: America/Los_Angeles

collections:
  lab:
    output: true
    permalink: /lab/:path/
    last_before: false

  pa:
    output: true
    permalink: /pa/:path/
    last_before: false

  lp:
    output: true
    permalink: /lp/:path/
    last_before: false
    
  exam:
    output: true
    permalink: /exam/:path/
  info:
    output: true
    permalink: /info/:path/
  lectures:
    output: true
    permalink: /lectures/:path/

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      layout: default
  -
    scope:
      path: ""
      type: hwk
    values:
      layout: hwk
  -
    scope:
      path: ""
      type: lab
    values:
      layout: lab
  -
    scope:
      path: ""
      type: pa
    values:
      layout: lab
  -
    scope:
      path: ""
      type: lp
    values:
      layout: lab
  -
    scope:
      path: ""
      type: exam
    values:
      layout: exam_info
  -
    scope:
      path: ""
      type: info
    values:
      layout: default
  -
    scope:
      path: ""
      type: lectures
    values:
      layout: lecture
  -
    scope:
      path: "syllabus.md"
      type: info
    values:
      layout: handout

theme: jekyll-theme-cayman
