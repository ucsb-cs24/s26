<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backpropagation DFS — CS24 Visualization</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #f8f9fa;
    --color-panel: #ffffff;
    --color-border: #dee2e6;
    --color-muted: #868e96;
    --color-text: #212529;
    --color-green-bg: #d3f9d8;
    --color-yellow-bg: #fff3bf;
    --color-info-bg: #e7f5ff;
    --color-info-border: #1971c2;
    --color-warn-bg: #fff9db;
    --color-warn-border: #f59f00;
    --color-success-bg: #ebfbee;
    --color-success-border: #2f9e44;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Progress bar ─────────────────────────────────────── */
  #progress-bar-outer {
    width: 100%;
    height: 4px;
    background: #dee2e6;
    flex-shrink: 0;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #3b5bdb, #1971c2);
    transition: width 0.35s ease;
    width: 0%;
  }

  /* ── Header ───────────────────────────────────────────── */
  header {
    background: #1c2b4a;
    color: #fff;
    padding: 11px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .header-right {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header span.subtitle {
    font-size: 13px;
    color: #adb5bd;
  }
  #header-step-counter {
    font-size: 13px;
    color: #74c0fc;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── Description bar (full-width) ────────────────────── */
  #desc-bar {
    background: var(--color-panel);
    border-bottom: 1px solid var(--color-border);
    padding: 11px 20px 13px;
    flex-shrink: 0;
  }
  #step-title {
    font-size: 18px;
    font-weight: 700;
    color: #1c2b4a;
    margin-bottom: 5px;
    line-height: 1.3;
  }
  #step-desc {
    font-size: 14px;
    line-height: 1.6;
    color: #343a40;
  }

  /* fn-box + callout side by side */
  #fn-callout-row {
    display: flex;
    gap: 10px;
    margin-top: 9px;
    align-items: flex-start;
  }
  #fn-box {
    flex: 1;
    min-width: 0;
    background: #1a1a2e;
    border-radius: 6px;
    padding: 8px 12px;
  }
  #fn-box-label {
    font-size: 10px;
    color: #6c757d;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  #fn-box-text {
    font-family: var(--font-mono);
    font-size: 13px;
    color: #69db7c;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #callout-box {
    flex: 1;
    min-width: 0;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  #callout-box.info {
    background: var(--color-info-bg);
    border-left: 4px solid var(--color-info-border);
    color: #1a4a7a;
  }
  #callout-box.warning {
    background: var(--color-warn-bg);
    border-left: 4px solid var(--color-warn-border);
    color: #7a5000;
  }
  #callout-box.success {
    background: var(--color-success-bg);
    border-left: 4px solid var(--color-success-border);
    color: #1a5e2a;
  }

  /* ── Main: SVG (~65%) + side panel (~35%) ────────────── */
  main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  #svg-panel {
    flex: 65;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 14px;
    background: var(--color-panel);
    border-right: 1px solid var(--color-border);
  }
  #svg-panel svg {
    width: 100%;
    max-width: 760px;
    height: auto;
  }
  .node-circle {
    transition: fill 0.25s, stroke 0.25s, stroke-width 0.25s;
  }

  #side-panel {
    flex: 35;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    background: var(--color-panel);
    overflow: hidden;
  }
  .sub-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-bottom: 1px solid var(--color-border);
  }
  .sub-panel:last-child { border-bottom: none; }
  .sub-panel-header {
    background: #f1f3f5;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #495057;
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
  }
  .sub-panel-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  .empty-hint {
    color: var(--color-muted);
    font-style: italic;
    font-size: 13px;
    padding: 4px 2px;
  }

  /* Call stack items */
  .stack-item {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: #f8f9fa;
    color: #343a40;
    word-break: break-all;
    line-height: 1.4;
  }
  .stack-item.top-of-stack {
    background: #3b5bdb;
    color: #ffffff;
    font-weight: 600;
  }

  /* Map items */
  .map-item {
    font-size: 13px;
    padding: 5px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: #f8f9fa;
    color: #343a40;
    line-height: 1.4;
    transition: background 0.3s;
  }
  .map-item.new-entry {
    background: var(--color-green-bg);
    color: #1a5e2a;
    font-weight: 600;
  }
  .map-item.highlighted {
    background: var(--color-yellow-bg);
    color: #7a5000;
    font-weight: 600;
  }
  .map-entry-code {
    font-family: var(--font-mono);
    font-size: 13px;
  }

  /* ── Footer controls ──────────────────────────────────── */
  #controls {
    padding: 11px 20px;
    border-top: 1px solid var(--color-border);
    background: var(--color-panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  button.nav-btn {
    background: #3b5bdb;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    letter-spacing: 0.01em;
  }
  button.nav-btn:hover:not(:disabled) { background: #2f4ac9; }
  button.nav-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  #step-counter {
    font-size: 14px;
    color: var(--color-muted);
    min-width: 90px;
    text-align: center;
  }
  #kbd-hint {
    font-size: 12px;
    color: var(--color-muted);
  }
</style>
</head>
<body>

<div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>

<header>
  <h1>Backpropagation DFS</h1>
  <div class="header-right">
    <span class="subtitle">CS24 — Interactive Step-Through</span>
    <span id="header-step-counter">step 0 of 23</span>
  </div>
</header>

<div id="desc-bar">
  <div id="step-title"></div>
  <div id="step-desc"></div>
  <div id="fn-callout-row" style="display:none">
    <div id="fn-box" style="display:none">
      <div id="fn-box-label">Current function call</div>
      <div id="fn-box-text"></div>
    </div>
    <div id="callout-box" style="display:none"></div>
  </div>
</div>

<main>
  <!-- SVG Panel (~65% width) -->
  <div id="svg-panel">
    <svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg"
         aria-label="Neural network backpropagation visualization">
      <defs>
        <marker id="arrow-gray"   markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0.5 L0,6.5 L7.5,3.5 Z" fill="#adb5bd"/>
        </marker>
        <marker id="arrow-blue"   markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0.5 L0,6.5 L7.5,3.5 Z" fill="#1971c2"/>
        </marker>
        <marker id="arrow-green"  markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0.5 L0,6.5 L7.5,3.5 Z" fill="#2f9e44"/>
        </marker>
        <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0.5 L0,6.5 L7.5,3.5 Z" fill="#f76707"/>
        </marker>
        <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0.5 L0,6.5 L7.5,3.5 Z" fill="#7048e8"/>
        </marker>
      </defs>

      <!-- Layer labels (font-size 12→15) -->
      <text x="110" y="52" text-anchor="middle" font-size="15" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Input Layer</text>
      <text x="360" y="52" text-anchor="middle" font-size="15" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Hidden Layer</text>
      <text x="620" y="52" text-anchor="middle" font-size="15" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Output Layer</text>

      <!-- ════════════════ EDGES ════════════════ -->
      <!-- Node centers: N1(110,155) N2(110,330) N3(360,155) N4(360,330) N5(620,242) r=40 -->

      <!-- 1→3 (horizontal) -->
      <g id="edge-group-1-3">
        <line id="edge-1-3"
          x1="150" y1="155" x2="320" y2="155"
          stroke="#dee2e6" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
        <line id="back-1-3"
          x1="320" y1="148" x2="150" y2="148"
          stroke="#f76707" stroke-width="2.5" stroke-dasharray="6 3"
          marker-end="url(#arrow-orange)" style="display:none"/>
      </g>

      <!-- 1→4 (diagonal) -->
      <g id="edge-group-1-4">
        <line id="edge-1-4"
          x1="143" y1="178" x2="327" y2="307"
          stroke="#dee2e6" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
        <line id="back-1-4"
          x1="325" y1="314" x2="141" y2="189"
          stroke="#f76707" stroke-width="2.5" stroke-dasharray="6 3"
          marker-end="url(#arrow-orange)" style="display:none"/>
      </g>

      <!-- 2→3 (diagonal) -->
      <g id="edge-group-2-3">
        <line id="edge-2-3"
          x1="143" y1="307" x2="327" y2="178"
          stroke="#dee2e6" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
        <line id="back-2-3"
          x1="325" y1="171" x2="141" y2="296"
          stroke="#f76707" stroke-width="2.5" stroke-dasharray="6 3"
          marker-end="url(#arrow-orange)" style="display:none"/>
      </g>

      <!-- 2→4 (horizontal) -->
      <g id="edge-group-2-4">
        <line id="edge-2-4"
          x1="150" y1="330" x2="320" y2="330"
          stroke="#dee2e6" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
        <line id="back-2-4"
          x1="320" y1="337" x2="150" y2="337"
          stroke="#f76707" stroke-width="2.5" stroke-dasharray="6 3"
          marker-end="url(#arrow-orange)" style="display:none"/>
      </g>

      <!-- 3→5 (diagonal) -->
      <g id="edge-group-3-5">
        <line id="edge-3-5"
          x1="398" y1="168" x2="582" y2="229"
          stroke="#dee2e6" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
        <line id="back-3-5"
          x1="577" y1="236" x2="405" y2="179"
          stroke="#f76707" stroke-width="2.5" stroke-dasharray="6 3"
          marker-end="url(#arrow-orange)" style="display:none"/>
      </g>

      <!-- 4→5 (diagonal) -->
      <g id="edge-group-4-5">
        <line id="edge-4-5"
          x1="398" y1="317" x2="582" y2="255"
          stroke="#dee2e6" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
        <line id="back-4-5"
          x1="577" y1="248" x2="405" y2="306"
          stroke="#f76707" stroke-width="2.5" stroke-dasharray="6 3"
          marker-end="url(#arrow-orange)" style="display:none"/>
      </g>

      <!-- Weight labels (font-size 11→14) -->
      <text id="wlabel-1-3" x="235" y="145" text-anchor="middle" font-size="14" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">w&#x2081;&#x2083;</text>
      <text id="wlabel-1-4" x="227" y="248" text-anchor="middle" font-size="14" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">w&#x2081;&#x2084;</text>
      <text id="wlabel-2-3" x="227" y="237" text-anchor="middle" font-size="14" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">w&#x2082;&#x2083;</text>
      <text id="wlabel-2-4" x="235" y="320" text-anchor="middle" font-size="14" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">w&#x2082;&#x2084;</text>
      <text id="wlabel-3-5" x="490" y="190" text-anchor="middle" font-size="14" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">w&#x2083;&#x2085;</text>
      <text id="wlabel-4-5" x="490" y="298" text-anchor="middle" font-size="14" fill="#868e96"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">w&#x2084;&#x2085;</text>

      <!-- ════════════════ BACKWARD ARROW LABELS (C_in / C_out) ════════════════ -->
      <!-- Positioned near arrowhead of each backward (orange dashed) edge.      -->
      <!-- Text content ("in"/"out") updated dynamically per step.               -->
      <!-- paint-order:stroke fill creates white outline for legibility.         -->

      <!-- back-1-3: arrowhead near N1 at ~(150,148) -->
      <text id="arrow-label-1-3" display="none"
            x="192" y="134" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="13" font-weight="700" fill="#e8590c"
            stroke="white" stroke-width="3" paint-order="stroke fill"
            >C<tspan class="sub" dy="4" dx="-1" font-size="10">in</tspan></text>

      <!-- back-1-4: arrowhead near N1 at ~(141,189) -->
      <text id="arrow-label-1-4" display="none"
            x="164" y="174" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="13" font-weight="700" fill="#e8590c"
            stroke="white" stroke-width="3" paint-order="stroke fill"
            >C<tspan class="sub" dy="4" dx="-1" font-size="10">in</tspan></text>

      <!-- back-2-3: arrowhead near N2 at ~(141,296) -->
      <text id="arrow-label-2-3" display="none"
            x="164" y="311" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="13" font-weight="700" fill="#e8590c"
            stroke="white" stroke-width="3" paint-order="stroke fill"
            >C<tspan class="sub" dy="4" dx="-1" font-size="10">in</tspan></text>

      <!-- back-2-4: arrowhead near N2 at ~(150,337) -->
      <text id="arrow-label-2-4" display="none"
            x="192" y="356" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="13" font-weight="700" fill="#e8590c"
            stroke="white" stroke-width="3" paint-order="stroke fill"
            >C<tspan class="sub" dy="4" dx="-1" font-size="10">in</tspan></text>

      <!-- back-3-5: arrowhead near N3 at ~(405,179) -->
      <text id="arrow-label-3-5" display="none"
            x="426" y="164" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="13" font-weight="700" fill="#e8590c"
            stroke="white" stroke-width="3" paint-order="stroke fill"
            >C<tspan class="sub" dy="4" dx="-1" font-size="10">in</tspan></text>

      <!-- back-4-5: arrowhead near N4 at ~(405,306) -->
      <text id="arrow-label-4-5" display="none"
            x="426" y="323" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="13" font-weight="700" fill="#e8590c"
            stroke="white" stroke-width="3" paint-order="stroke fill"
            >C<tspan class="sub" dy="4" dx="-1" font-size="10">in</tspan></text>

      <!-- ════════════════ DELTA ACCUMULATION LABELS (+Δw / +Δb) ════════════════ -->
      <!-- Shown in purple when visitContributeNeighbor (weight) or              -->
      <!-- visitContributeNode (bias) is actively accumulating a delta.          -->
      <!-- paint-order:stroke fill gives a white outline for legibility.         -->

      <!-- edge 1-3: above weight label -->
      <text id="delta-edge-1-3" display="none" x="235" y="128" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;w</text>

      <!-- edge 1-4: left of midpoint -->
      <text id="delta-edge-1-4" display="none" x="207" y="230" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;w</text>

      <!-- edge 2-3: right of midpoint -->
      <text id="delta-edge-2-3" display="none" x="252" y="257" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;w</text>

      <!-- edge 2-4: above weight label -->
      <text id="delta-edge-2-4" display="none" x="235" y="307" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;w</text>

      <!-- edge 3-5: right of weight label -->
      <text id="delta-edge-3-5" display="none" x="513" y="180" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;w</text>

      <!-- edge 4-5: right of weight label -->
      <text id="delta-edge-4-5" display="none" x="513" y="309" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;w</text>

      <!-- node 3 bias: below node 3 (cy=155, r=40 → bottom at 195) -->
      <text id="delta-node-3" display="none" x="360" y="208" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;b</text>

      <!-- node 4 bias: below node 4 (cy=330, r=40 → bottom at 370) -->
      <text id="delta-node-4" display="none" x="360" y="383" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;b</text>

      <!-- node 5 bias: above node 5 (cy=242, r=40 → top at 202) -->
      <text id="delta-node-5" display="none" x="620" y="192" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
            font-size="12" font-weight="700" fill="#7048e8"
            stroke="white" stroke-width="3" paint-order="stroke fill">+&#x394;b</text>

      <!-- ════════════════ NODES (r 36→40, fonts enlarged) ════════════════ -->
      <!-- Node 1 -->
      <g id="node-group-1">
        <circle id="node-1" class="node-circle" cx="110" cy="155" r="40"
                fill="#f8f9fa" stroke="#ced4da" stroke-width="2"/>
        <text x="110" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#212529"

      currentFn: null,
      callout: { type: 'info', text: 'The contributions map resets for each example, but \u0394w and \u0394b carry over \u2014 they accumulate across the whole batch.' },
      arrowLabels: {},
    },
    // 22
    {
      title: 'Example 2 \u2014 Backpropagation (condensed)',
      desc: "A second training example (x\u2082, y\u2082) runs through the network. contribute(y\u2082, p\u2082) executes the full DFS \u2014 the same 21-step process. The contributions map refills for (x\u2082, y\u2082), and every \u0394w and \u0394b grows further. All six weight deltas and three bias deltas (\u0394b\u2083, \u0394b\u2084, \u0394b\u2085) now hold the sum of gradients from both examples.",
      nodes: allNodesState('done'),
      edges: { '1-3':'active-back','1-4':'active-back','2-3':'active-back','2-4':'active-back','3-5':'active-back','4-5':'active-back' },
      stack: [],
      map: [{ node: 5, label: 'C\u2085 seeded (output error)' }, { node: 3, label: 'C\u2083 ready' }, { node: 4, label: 'C\u2084 ready' }],
      currentFn: 'contribute(y\u2082, p\u2082)  \u2014 full DFS (condensed)',
      callout: { type: 'info', text: 'Same DFS as example 1. Now every \u0394w and \u0394b (\u0394b\u2083, \u0394b\u2084, \u0394b\u2085) holds the accumulated gradient from both training examples.' },
      arrowLabels: {},
    },
    // 23
    {
      title: 'update() \u2014 Apply Averaged Deltas',
      desc: "update() is called once for the batch. For each weight and bias:\n  w \u2212= learningRate \u00d7 (\u0394w \u00f7 2)\n  b \u2212= learningRate \u00d7 (\u0394b \u00f7 2)\nDividing by 2 averages the gradient across both examples. All deltas then reset to zero.",
      nodes: allNodesState('updating'), edges: allEdgesState('updating'),
      stack: [],
      map: [],
      currentFn: 'update()',
      callout: { type: 'success', text: 'The network is now slightly better. Repeat for thousands of batches and the weights converge to a solution.' },
      arrowLabels: {},
    },
  ];

  const TOTAL_STEPS = STEPS.length; // 24

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const progressBar       = document.getElementById('progress-bar-inner');
  const headerStepCounter = document.getElementById('header-step-counter');
  const stepTitle         = document.getElementById('step-title');
  const stepDesc          = document.getElementById('step-desc');
  const fnCalloutRow      = document.getElementById('fn-callout-row');
  const fnBox             = document.getElementById('fn-box');
  const fnBoxText         = document.getElementById('fn-box-text');
  const calloutBox        = document.getElementById('callout-box');
  const callStackBody     = document.getElementById('call-stack-body');
  const mapBody           = document.getElementById('map-body');
  const stepCounter       = document.getElementById('step-counter');
  const btnPrev           = document.getElementById('btn-prev');
  const btnNext           = document.getElementById('btn-next');

  let currentStep = 0;

  // ─── Apply step ───────────────────────────────────────────────────────────
  function applyStep(idx) {
    const s = STEPS[idx];

    // Progress bar
    const pct = TOTAL_STEPS > 1 ? (idx / (TOTAL_STEPS - 1)) * 100 : 0;
    progressBar.style.width = pct + '%';

    // Title / description / counters
    stepTitle.textContent = s.title;
    stepDesc.textContent  = s.desc;
    const counterText = 'step ' + idx + ' of ' + (TOTAL_STEPS - 1);
    stepCounter.textContent       = counterText;
    headerStepCounter.textContent = counterText;

    // Buttons
    btnPrev.disabled = idx === 0;
    btnNext.disabled = idx === TOTAL_STEPS - 1;

    // fn-box
    if (s.currentFn) {
      fnBoxText.textContent = s.currentFn;
      fnBox.style.display = 'block';
    } else {
      fnBox.style.display = 'none';
    }

    // callout
    if (s.callout) {
      calloutBox.textContent = s.callout.text;
      calloutBox.className   = s.callout.type;
      calloutBox.style.display = 'block';
    } else {
      calloutBox.className     = '';
      calloutBox.style.display = 'none';
    }

    // Show/hide the fn-callout row
    fnCalloutRow.style.display = (s.currentFn || s.callout) ? 'flex' : 'none';

    // SVG
    applyNodeStates(s.nodes);
    applyEdgeStates(s.edges);
    applyArrowLabels(s.arrowLabels || {});
    applyDeltaLabels(idx);

    // Side-panel
    renderCallStack(s.stack);
    renderMap(s.map);
  }

  function applyNodeStates(nodes) {
    ALL_NODES.forEach(n => {
      const style = NODE_STYLES[nodes[n] || 'normal'];
      const el    = document.getElementById('node-' + n);
      if (!el) return;
      el.style.fill        = style.fill;
      el.style.stroke      = style.stroke;
      el.style.strokeWidth = style.strokeWidth;
    });
  }

  function applyEdgeStates(edges) {
    ALL_EDGES.forEach(key => {
      const state  = edges[key] || 'normal';
      const fwdEl  = document.getElementById('edge-' + key);
      const backEl = document.getElementById('back-' + key);
      if (!fwdEl) return;

      if (state === 'active-back') {
        // Dim the forward arrow, show the backward orange dashed arrow
        fwdEl.setAttribute('stroke', '#dee2e6');
        fwdEl.setAttribute('stroke-width', '1.5');
        fwdEl.setAttribute('marker-end', 'url(#arrow-gray)');
        fwdEl.removeAttribute('stroke-dasharray');
        if (backEl) backEl.style.display = '';
      } else {
        if (backEl) backEl.style.display = 'none';
        const style = EDGE_STYLES[state] || EDGE_STYLES.normal;
        fwdEl.setAttribute('stroke', style.stroke);
        fwdEl.setAttribute('stroke-width', style.strokeWidth);
        fwdEl.setAttribute('marker-end', style.marker);
        fwdEl.removeAttribute('stroke-dasharray');
      }
    });
  }

  // Show C_in or C_out labels on active backward arrows
  function applyArrowLabels(labels) {
    ALL_EDGES.forEach(key => {
      const el  = document.getElementById('arrow-label-' + key);
      if (!el) return;
      const val = labels[key]; // 'in' | 'out' | undefined
      if (val) {
        el.querySelector('.sub').textContent = val;
        el.removeAttribute('display');
      } else {
        el.setAttribute('display', 'none');
      }
    });
  }

  // Show +Δw/+Δb labels — once a delta appears it persists until update() clears them
  function applyDeltaLabels(stepIdx) {
    ALL_EDGES.forEach(key => {
      const el = document.getElementById('delta-edge-' + key);
      if (!el) return;
      const first = DELTA_FIRST['edge-' + key];
      const show = first !== undefined && stepIdx >= first && stepIdx < DELTA_CLEAR_STEP;
      el.setAttribute('display', show ? '' : 'none');
    });
    ALL_NODES.forEach(n => {
      const el = document.getElementById('delta-node-' + n);
      if (!el) return;
      const first = DELTA_FIRST['node-' + n];
      const show = first !== undefined && stepIdx >= first && stepIdx < DELTA_CLEAR_STEP;
      el.setAttribute('display', show ? '' : 'none');
    });
  }

  function renderCallStack(stack) {
    if (!stack || stack.length === 0) {
      callStackBody.innerHTML = '<div class="empty-hint">(empty)</div>';
      return;
    }
    callStackBody.innerHTML = stack.map((item, i) => {
      const top = i === stack.length - 1;
      return '<div class="stack-item' + (top ? ' top-of-stack' : '') + '">' + escHtml(item) + '</div>';
    }).join('');
    callStackBody.scrollTop = callStackBody.scrollHeight;
  }

  const NODE_SUBS = ['\u2080','\u2081','\u2082','\u2083','\u2084','\u2085','\u2086','\u2087','\u2088','\u2089'];

  function renderMap(map) {
    if (!map || map.length === 0) {
      mapBody.innerHTML = '<div class="empty-hint">(empty)</div>';
      return;
    }
    mapBody.innerHTML = map.map(entry => {
      let cls = 'map-item';
      if (entry.newEntry)    cls += ' new-entry';
      if (entry.highlighted) cls += ' highlighted';
      const cval = 'C' + (NODE_SUBS[entry.node] || entry.node);
      return '<div class="' + cls + '"><span class="map-entry-code">{ ' + entry.node + ' : ' + cval + ' }</span></div>';
    }).join('');
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── Navigation ───────────────────────────────────────────────────────────
  function goTo(idx) {
    if (idx < 0 || idx >= TOTAL_STEPS) return;
    currentStep = idx;
    applyStep(currentStep);
  }

  btnPrev.addEventListener('click', () => goTo(currentStep - 1));
  btnNext.addEventListener('click', () => goTo(currentStep + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(currentStep - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentStep + 1); }
  });

  // ─── Init ─────────────────────────────────────────────────────────────────
  applyStep(0);
})();
</script>
</body>
</html>
