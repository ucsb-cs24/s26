<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Neural Networks — CS24</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #f8f9fa;
    --color-panel: #ffffff;
    --color-border: #dee2e6;
    --color-muted: #868e96;
    --color-text: #212529;
    --color-navy: #1c2b4a;
    --color-blue: #1971c2;
    --color-blue-fill: #e7f5ff;
    --color-orange: #e67700;
    --color-orange-fill: #fff4e6;
    --color-green: #2f9e44;
    --color-green-fill: #ebfbee;
    --color-pink: #c2255c;
    --color-pink-fill: #fff0f6;
    --color-red: #e03131;
    --color-red-fill: #ffe3e3;
    --color-gray: #adb5bd;
    --color-gray-fill: #f8f9fa;
    --color-info-bg: #e7f5ff;
    --color-info-border: #1971c2;
    --color-warn-bg: #fff9db;
    --color-warn-border: #f59f00;
    --color-success-bg: #ebfbee;
    --color-success-border: #2f9e44;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Progress bar ─────────────────────────────────────── */
  #progress-bar-outer {
    width: 100%;
    height: 5px;
    background: #dee2e6;
    flex-shrink: 0;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #e67700, #f59f00);
    transition: width 0.35s ease;
    width: 0%;
  }

  /* ── Header ───────────────────────────────────────────── */
  header {
    background: var(--color-navy);
    color: #fff;
    padding: 11px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  header .subtitle {
    font-size: 12px;
    color: #adb5bd;
  }
  #header-step-counter {
    font-size: 13px;
    color: #ffd43b;
    font-weight: 700;
    white-space: nowrap;
    background: rgba(255,255,255,0.07);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── Description bar ──────────────────────────────────── */
  #desc-bar {
    background: var(--color-panel);
    border-bottom: 1px solid var(--color-border);
    padding: 10px 20px 12px;
    flex-shrink: 0;
  }
  #step-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--color-navy);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #step-desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: #343a40;
  }
  #callout-box {
    margin-top: 8px;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }
  #callout-box.info {
    display: block;
    background: var(--color-info-bg);
    border-left: 4px solid var(--color-info-border);
    color: #1a4a7a;
  }
  #callout-box.warning {
    display: block;
    background: var(--color-warn-bg);
    border-left: 4px solid var(--color-warn-border);
    color: #7a5000;
  }
  #callout-box.success {
    display: block;
    background: var(--color-success-bg);
    border-left: 4px solid var(--color-success-border);
    color: #1a5e2a;
  }

  /* ── Main area ────────────────────────────────────────── */
  main {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* SVG panel */
  #svg-panel {
    flex: 6;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 12px;
    background: var(--color-panel);
    border-right: 1px solid var(--color-border);
  }
  #svg-panel svg {
    width: 100%;
    max-width: 760px;
    height: auto;
  }

  /* Formula panel */
  #formula-panel {
    flex: 4;
    min-width: 220px;
    padding: 14px 16px;
    background: #fafbfc;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .f-concept {
    display: inline-block;
    background: var(--color-orange);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 4px;
  }
  .f-heading {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-navy);
    margin-bottom: 2px;
  }
  .f-formula {
    font-family: var(--font-mono);
    background: #f1f3f5;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 10px 12px;
    white-space: pre-wrap;
    font-size: 12.5px;
    line-height: 1.85;
    color: #212529;
  }
  .f-formula .hl { color: #e67700; font-weight: 700; }
  .f-formula .hl-blue { color: #1971c2; font-weight: 700; }
  .f-formula .hl-green { color: #2f9e44; font-weight: 700; }
  .f-formula .hl-pink { color: #c2255c; font-weight: 700; }

  .f-vars {
    list-style: none;
    font-size: 12px;
    line-height: 1.7;
    color: #495057;
  }
  .f-vars li { display: flex; gap: 8px; align-items: baseline; }
  .f-vars .vk {
    font-family: var(--font-mono);
    color: #1971c2;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .f-divider {
    border: none;
    border-top: 1px solid #dee2e6;
    margin: 2px 0;
  }
  .f-note {
    font-size: 11.5px;
    font-style: italic;
    color: #868e96;
    line-height: 1.5;
  }

  /* ── Footer ───────────────────────────────────────────── */
  #controls {
    padding: 10px 20px;
    border-top: 1px solid var(--color-border);
    background: var(--color-panel);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-shrink: 0;
  }
  button.nav-btn {
    background: var(--color-orange);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    letter-spacing: 0.01em;
  }
  button.nav-btn:hover:not(:disabled) { background: #c96000; }
  button.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #footer-counter {
    font-size: 13px;
    color: #495057;
    font-weight: 600;
    min-width: 80px;
    text-align: center;
  }
  #key-hint {
    font-size: 11px;
    color: var(--color-muted);
  }

  /* SVG element transitions */
  .nn-edge { transition: stroke 0.3s, stroke-width 0.3s, opacity 0.3s; }
  .nn-node { transition: fill 0.3s, stroke 0.3s, stroke-width 0.3s; }
</style>
</head>
<body>

<!-- Progress bar -->
<div id="progress-bar-outer" role="progressbar" aria-valuemin="0" aria-valuemax="10" aria-valuenow="0">
  <div id="progress-bar-inner"></div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <h1>Training Neural Networks &mdash; CS24</h1>
    <span class="subtitle">Cost &middot; Gradient Descent &middot; Backpropagation</span>
  </div>
  <div id="header-step-counter">Step 1 / 11</div>
</header>

<!-- Description bar -->
<div id="desc-bar" aria-live="polite">
  <div id="step-title"></div>
  <div id="step-desc"></div>
  <div id="callout-box" role="note"></div>
</div>

<!-- Main -->
<main>
  <!-- SVG panel -->
  <div id="svg-panel" aria-label="Visualization diagram">
    <svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#1971c2"/>
        </marker>
        <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#2f9e44"/>
        </marker>
        <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#adb5bd"/>
        </marker>
        <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#e67700"/>
        </marker>
        <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#495057"/>
        </marker>
        <!-- Reverse arrowhead for backprop (pointing left) -->
        <marker id="arrow-orange-rev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
          <path d="M8,0 L8,6 L0,3 z" fill="#e67700"/>
        </marker>
      </defs>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SCENE A: Neural Network                               -->
      <!-- ══════════════════════════════════════════════════════ -->
      <g id="scene-nn">

        <!-- Edges (drawn first so nodes appear on top) -->
        <!-- in0 (80,165) → hid0 (360,120) -->
        <line id="nn-e0" class="nn-edge" x1="106" y1="157" x2="334" y2="128" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- in0 (80,165) → hid1 (360,235) -->
        <line id="nn-e1" class="nn-edge" x1="106" y1="168" x2="334" y2="231" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- in0 (80,165) → hid2 (360,350) -->
        <line id="nn-e2" class="nn-edge" x1="106" y1="173" x2="334" y2="342" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- in1 (80,305) → hid0 (360,120) -->
        <line id="nn-e3" class="nn-edge" x1="106" y1="297" x2="334" y2="128" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- in1 (80,305) → hid1 (360,235) -->
        <line id="nn-e4" class="nn-edge" x1="106" y1="302" x2="334" y2="237" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- in1 (80,305) → hid2 (360,350) -->
        <line id="nn-e5" class="nn-edge" x1="106" y1="307" x2="334" y2="348" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- hid0 (360,120) → out (635,235) -->
        <line id="nn-e6" class="nn-edge" x1="386" y1="125" x2="609" y2="226" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- hid1 (360,235) → out (635,235) -->
        <line id="nn-e7" class="nn-edge" x1="386" y1="235" x2="609" y2="235" stroke="#adb5bd" stroke-width="1.5"/>
        <!-- hid2 (360,350) → out (635,235) -->
        <line id="nn-e8" class="nn-edge" x1="386" y1="345" x2="609" y2="244" stroke="#adb5bd" stroke-width="1.5"/>

        <!-- Weight labels (w1–w9) near edge midpoints -->
        <g id="nn-weight-labels" font-size="10" fill="#868e96" font-family="'SFMono-Regular',monospace">
          <text x="218" y="133">w₁</text>
          <text x="213" y="203">w₂</text>
          <text x="196" y="268">w₃</text>
          <text x="213" y="222">w₄</text>
          <text x="218" y="277">w₅</text>
          <text x="218" y="335">w₆</text>
          <text x="500" y="172">w₇</text>
          <text x="500" y="231">w₈</text>
          <text x="500" y="300">w₉</text>
        </g>

        <!-- Gradient labels (∂C/∂wi) — same positions, starts hidden -->
        <g id="nn-gradient-labels" font-size="9" fill="#e67700" font-family="'SFMono-Regular',monospace" display="none">
          <text x="205" y="133">∂C/∂w₁</text>
          <text x="200" y="203">∂C/∂w₂</text>
          <text x="183" y="268">∂C/∂w₃</text>
          <text x="200" y="222">∂C/∂w₄</text>
          <text x="205" y="277">∂C/∂w₅</text>
          <text x="205" y="335">∂C/∂w₆</text>
          <text x="487" y="172">∂C/∂w₇</text>
          <text x="487" y="231">∂C/∂w₈</text>
          <text x="487" y="300">∂C/∂w₉</text>
        </g>

        <!-- Backward arrows: right-to-left, dashed orange -->
        <g id="nn-backward-arrows" display="none">
          <!-- out → hid0 -->
          <line x1="609" y1="226" x2="390" y2="130" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
          <!-- out → hid1 -->
          <line x1="609" y1="235" x2="390" y2="235" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
          <!-- out → hid2 -->
          <line x1="609" y1="244" x2="390" y2="345" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
          <!-- hid0 → in0 -->
          <line x1="334" y1="120" x2="110" y2="160" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
          <!-- hid1 → in0 -->
          <line x1="334" y1="231" x2="110" y2="168" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
          <!-- hid2 → in1 -->
          <line x1="334" y1="342" x2="110" y2="303" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
          <!-- hid1 → in1 -->
          <line x1="334" y1="237" x2="110" y2="298" stroke="#e67700" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
        </g>

        <!-- Input nodes -->
        <circle id="nn-n-in0" class="nn-node" cx="80" cy="165" r="26" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
        <text x="80" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#1971c2">x₁</text>
        <circle id="nn-n-in1" class="nn-node" cx="80" cy="305" r="26" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
        <text x="80" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#1971c2">x₂</text>

        <!-- Hidden nodes -->
        <circle id="nn-n-hid0" class="nn-node" cx="360" cy="120" r="26" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5"/>
        <text x="360" y="125" text-anchor="middle" font-size="13" fill="#495057">h₁</text>
        <circle id="nn-n-hid1" class="nn-node" cx="360" cy="235" r="26" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5"/>
        <text x="360" y="240" text-anchor="middle" font-size="13" fill="#495057">h₂</text>
        <circle id="nn-n-hid2" class="nn-node" cx="360" cy="350" r="26" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5"/>
        <text x="360" y="355" text-anchor="middle" font-size="13" fill="#495057">h₃</text>

        <!-- Output node -->
        <circle id="nn-n-out" class="nn-node" cx="635" cy="235" r="26" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5"/>
        <text x="635" y="240" text-anchor="middle" font-size="13" fill="#495057">ŷ</text>

        <!-- Value annotations (inside/below node labels) — starts hidden -->
        <g id="nn-val0" display="none">
          <text x="80" y="183" text-anchor="middle" font-size="9" fill="#1971c2">1.0</text>
        </g>
        <g id="nn-val1" display="none">
          <text x="80" y="323" text-anchor="middle" font-size="9" fill="#1971c2">0.0</text>
        </g>
        <g id="nn-val2" display="none">
          <text x="360" y="138" text-anchor="middle" font-size="9" fill="#495057">0.61</text>
        </g>
        <g id="nn-val3" display="none">
          <text x="360" y="253" text-anchor="middle" font-size="9" fill="#495057">0.37</text>
        </g>
        <g id="nn-val4" display="none">
          <text x="360" y="368" text-anchor="middle" font-size="9" fill="#495057">0.14</text>
        </g>
        <g id="nn-val5" display="none">
          <text x="635" y="253" text-anchor="middle" font-size="9" fill="#495057">0.72</text>
        </g>

        <!-- True label annotation -->
        <g id="nn-true-label" display="none">
          <text x="700" y="200" text-anchor="middle" font-size="11" fill="#2f9e44" font-weight="700">y = 1.0</text>
          <text x="700" y="215" text-anchor="middle" font-size="10" fill="#2f9e44">(true label)</text>
        </g>

        <!-- Error label annotation -->
        <g id="nn-error-label" display="none">
          <text x="700" y="197" text-anchor="middle" font-size="10" fill="#e03131">ŷ = 0.72</text>
          <text x="700" y="211" text-anchor="middle" font-size="10" fill="#2f9e44">y = 1.0</text>
          <line x1="672" y1="217" x2="728" y2="217" stroke="#868e96" stroke-width="1"/>
          <text x="700" y="231" text-anchor="middle" font-size="11" fill="#e67700" font-weight="700">err = −0.28</text>
        </g>

        <!-- Backprop label -->
        <text id="nn-backprop-label" x="380" y="22" text-anchor="middle" font-size="11" fill="#e67700" font-weight="600" display="none">&#8592; error flows backward (backpropagation) &#8594;</text>

        <!-- Layer labels -->
        <text x="80" y="432" text-anchor="middle" font-size="11" fill="#868e96">Input Layer</text>
        <text x="360" y="432" text-anchor="middle" font-size="11" fill="#868e96">Hidden Layer</text>
        <text x="635" y="432" text-anchor="middle" font-size="11" fill="#868e96">Output Layer</text>
      </g>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SCENE B: Cost Function Box                            -->
      <!-- ══════════════════════════════════════════════════════ -->
      <g id="scene-cost-box" display="none">

        <!-- Central box -->
        <rect x="260" y="160" width="240" height="130" rx="12" fill="#fff4e6" stroke="#e67700" stroke-width="2.5"/>
        <text x="380" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#e67700">C (W, b)</text>
        <text x="380" y="237" text-anchor="middle" font-size="13" fill="#c96000">Cost Function</text>

        <!-- Input arrows (from left) -->
        <!-- W arrow -->
        <line x1="90" y1="185" x2="256" y2="195" stroke="#1971c2" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
        <rect x="0" y="165" width="90" height="40" rx="6" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
        <text x="45" y="183" text-anchor="middle" font-size="15" font-weight="700" fill="#1971c2">W</text>
        <text x="45" y="199" text-anchor="middle" font-size="11" fill="#1971c2">(weights)</text>

        <!-- b arrow -->
        <line x1="90" y1="230" x2="256" y2="225" stroke="#1971c2" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
        <rect x="0" y="210" width="90" height="40" rx="6" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
        <text x="45" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#1971c2">b</text>
        <text x="45" y="244" text-anchor="middle" font-size="11" fill="#1971c2">(biases)</text>

        <!-- (x, y) training data arrow (gray dashed) -->
        <line x1="90" y1="278" x2="256" y2="262" stroke="#adb5bd" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
        <rect x="0" y="253" width="90" height="50" rx="6" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/>
        <text x="45" y="273" text-anchor="middle" font-size="13" fill="#495057">(x, y)</text>
        <text x="45" y="290" text-anchor="middle" font-size="11" fill="#868e96">training data</text>

        <!-- Output arrow (to right) -->
        <line x1="504" y1="225" x2="596" y2="225" stroke="#2f9e44" stroke-width="2.5" marker-end="url(#arrow-green)"/>
        <text x="636" y="210" text-anchor="middle" font-size="34" font-weight="900" fill="#2f9e44">C</text>
        <text x="636" y="234" text-anchor="middle" font-size="13" fill="#2f9e44">= 0.47</text>
        <text x="636" y="252" text-anchor="middle" font-size="11" fill="#868e96">(a scalar)</text>

        <!-- Bottom note -->
        <text x="380" y="355" text-anchor="middle" font-size="12" fill="#495057">C is a single number — one value for the entire network</text>
      </g>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SCENE C: Loss Curve                                   -->
      <!-- ══════════════════════════════════════════════════════ -->
      <g id="scene-loss-curve" display="none">

        <!-- Axes -->
        <line x1="50" y1="430" x2="720" y2="430" stroke="#495057" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <line x1="50" y1="430" x2="50" y2="25" stroke="#495057" stroke-width="2" marker-end="url(#arrow-dark)"/>
        <text x="718" y="425" text-anchor="middle" font-size="13" fill="#495057">w</text>
        <text x="50" y="20" text-anchor="middle" font-size="13" fill="#495057">C(w)</text>

<script>
(function () {
  'use strict';

  // ── Constants ──────────────────────────────────────────────────
  const TOTAL_STEPS = 11;
  const SCENES = ['scene-nn', 'scene-cost-box', 'scene-loss-curve', 'scene-training-loop'];

  // Node state styles
  const NODE_STYLES = {
    'default':       { fill: '#f8f9fa',  stroke: '#adb5bd', sw: '1.5', labelColor: '#495057' },
    'input':         { fill: '#e7f5ff',  stroke: '#1971c2', sw: '2',   labelColor: '#1971c2' },

    'output-error':  { fill: '#ffe3e3',  stroke: '#e03131', sw: '2.5', labelColor: '#e03131' },
    'done':          { fill: '#ebfbee',  stroke: '#2f9e44', sw: '2',   labelColor: '#2f9e44' },
  };

  // Edge state styles
  const EDGE_STYLES = {
    'default':  { stroke: '#adb5bd', sw: '1.5', dash: '' },
    'forward':  { stroke: '#1971c2', sw: '2.5', dash: '' },
    'dim':      { stroke: '#e9ecef', sw: '1',   dash: '' },

  };

  // ── Step data ──────────────────────────────────────────────────
  const STEPS = [
    // Step 0
    {
      title: 'The Goal: Find the Right Weights and Biases',
      desc: 'Training a neural network means finding weights <strong>W</strong> and biases <strong>b</strong> so that the network\'s predictions match the training data. At the start, all weights are set randomly — the network produces garbage outputs.',
      callout: null,
      scene: 'scene-nn',
      nn: {
        edges: ['default','default','default','default','default','default','default','default','default'],
        nodes: ['input','input','default','default','default','default'],
        showWeightLabels: true,
        showGradientLabels: false,
        showValues: false,
        showTrueLabel: false,
        showErrorLabel: false,
        showBackwardArrows: false,
        showBackpropLabel: false,
      },
      formula: {
        concept: 'Goal',
        heading: 'Minimize prediction error',
        code:
          'Goal: find W, b such that\n' +
          '  <span class="hl">network(x; W, b) ≈ y</span>',
        vars: [
          { k: 'W', v: 'all weight matrices in the network' },
          { k: 'b', v: 'all bias vectors in the network' },
          { k: 'x', v: 'input to the network (features)' },
          { k: 'y', v: 'true label (what we want the network to output)' },
        ],
        note: 'Weights start random. Training adjusts them so predictions improve.',
      },
    },

    // Step 1
    {
      title: 'Forward Pass — Computing a Prediction',
      desc: 'We feed input <strong>x = (1.0, 0.0)</strong> through the network. Each layer applies weights and an activation function. The output is <strong>ŷ = 0.72</strong>. The true label is <strong>y = 1.0</strong>.',
      callout: null,
      scene: 'scene-nn',
      nn: {
        edges: ['forward','forward','forward','forward','forward','forward','forward','forward','forward'],
        nodes: ['active','active','active','active','active','active'],
        showWeightLabels: true,
        showGradientLabels: false,
        showValues: true,
        showTrueLabel: true,
        showErrorLabel: false,
        showBackwardArrows: false,
        showBackpropLabel: false,
      },
      formula: {
        concept: 'Forward Pass',
        heading: 'Layer-by-layer computation',
        code:
          '<span class="hl-blue">h₁</span> = ReLU(w₁·x₁ + w₄·x₂ + b₁) = 0.61\n' +
          '<span class="hl-blue">h₂</span> = ReLU(w₂·x₁ + w₅·x₂ + b₂) = 0.37\n' +
          '<span class="hl-blue">h₃</span> = ReLU(w₃·x₁ + w₆·x₂ + b₃) = 0.14\n' +
          '<span class="hl">ŷ</span>  = σ(w₇·h₁ + w₈·h₂ + w₉·h₃ + b₄)\n' +
          '   = <span class="hl">0.72</span>',
        vars: [
          { k: 'ReLU(z)', v: 'max(0, z) — hidden layer activation' },
          { k: 'σ(z)',    v: '1/(1+e⁻ᶻ) — sigmoid, output in (0,1)' },
          { k: 'ŷ',       v: 'predicted value (network output)' },
        ],
        note: 'Every neuron computes: output = activation(weighted sum of inputs + bias)',
      },
    },

    // Step 2
    {
      title: 'The Prediction Was Wrong',
      desc: 'The network predicted <strong>ŷ = 0.72</strong> but the true label is <strong>y = 1.0</strong>. The error is −0.28. With random weights this is expected — but we need a way to measure how wrong we are across <em>all</em> training examples.',
      callout: {
        type: 'warning',
        text: 'With random weights, predictions are essentially random. The network needs systematic feedback to improve.',
      },
      scene: 'scene-nn',
      nn: {
        edges: ['dim','dim','dim','dim','dim','dim','dim','dim','dim'],
        nodes: ['input','input','default','default','default','output-error'],
        showWeightLabels: false,
        showGradientLabels: false,
        showValues: true,
        showTrueLabel: false,
        showErrorLabel: true,
        showBackwardArrows: false,
        showBackpropLabel: false,
      },
      formula: {
        concept: 'Prediction Error',
        heading: 'Single example error',
        code:
          'error = <span class="hl">ŷ − y</span>\n' +
          '      = 0.72 − 1.0\n' +
          '      = <span class="hl">−0.28</span>',
        vars: [
          { k: 'ŷ', v: '0.72 (network prediction)' },
          { k: 'y', v: '1.0 (true label)' },
        ],
        note: 'Negative error: we undershot. But this is just one example — we need an aggregate measure over the whole dataset.',
      },
    },

    // Step 3
    {
      title: 'The Cost Function C(W, b)',
      desc: 'The <strong>cost function</strong> takes all weights W, all biases b, and the training data as inputs. It outputs a single scalar measuring overall prediction quality. <strong>High C = bad network. Low C = good network.</strong>',
      callout: {
        type: 'info',
        text: 'C has two types of inputs: parameters we control (W, b) and the fixed training data (x, y). Training optimizes over W and b only.',
      },
      scene: 'scene-cost-box',
      formula: {
        concept: 'Cost Function',
        heading: 'Mean squared error (MSE)',
        code:
          '<span class="hl">C(W, b)</span> = (1/n) · Σᵢ (ŷᵢ − yᵢ)²\n\n' +
          'For our example:\n' +
          '  C = (0.72 − 1.0)² = <span class="hl">0.078</span>',
        vars: [
          { k: 'n',      v: 'number of training examples' },
          { k: 'ŷᵢ',     v: 'network prediction for example i' },
          { k: 'yᵢ',     v: 'true label for example i' },
          { k: 'C(W,b)', v: 'average squared prediction error' },
        ],
        note: 'Squaring makes all errors positive and penalizes large errors more heavily.',
      },
    },

    // Step 4
    {
      title: 'Every Set of Weights Maps to a Cost',
      desc: '<strong>Vary one weight → different prediction → different Cost value.</strong> Every possible value of <strong>w</strong> maps to a different C, tracing out a curve. The blue dot is our current position — high cost, bad weights. We want to slide down to the minimum.',
      callout: null,
      scene: 'scene-loss-curve',
      lossCurve: {
        ballX: 621, ballY: 98,
        showMinMarker: false,
        showTangent: false,
        showGradientLabel: false,
        showStepArrow: false,
        showBallNew: false,
        showStepLabel: false,
      },
      formula: {
        concept: 'Loss Landscape',
        heading: 'Cost as a function of weights',
        code:
          'C = <span class="hl">f(w₁, w₂, …, wₙ, b₁, b₂, …, bₘ)</span>\n\n' +
          'Vary one weight → different prediction\n' +
          '              → different C\n\n' +
          'High C = bad   Low C = good',
        vars: [
          { k: 'w',  v: 'current weight value (x-axis)' },
          { k: 'C',  v: 'cost at that weight value (y-axis)' },
          { k: '●',  v: 'blue dot = current (bad) position' },
        ],
        note: 'With millions of parameters, this is a surface in millions of dimensions — impossible to visualize, but the same principle applies.',
      },
    },

    // Step 5
    {
      title: 'Training = Finding the Minimum of C',
      desc: 'The optimal weights <strong>w*</strong> sit at the bottom of the cost curve. At the minimum, the network\'s predictions are as accurate as possible. In practice, the landscape has millions of dimensions — we need a smart algorithm to find the way down.',
      callout: {
        type: 'success',
        text: 'A network with millions of parameters is navigating a landscape with millions of dimensions. Gradient descent finds the way down systematically.',
      },
      scene: 'scene-loss-curve',
      lossCurve: {
        ballX: 621, ballY: 98,
        showMinMarker: true,
        showTangent: false,
        showGradientLabel: false,
        showStepArrow: false,
        showBallNew: false,
        showStepLabel: false,
      },
      formula: {
        concept: 'Optimization Goal',
        heading: 'Argmin of the cost',
        code:
          '<span class="hl-green">W*, b*</span> = argmin C(W, b)\n' +
          '           W, b\n\n' +
          'i.e., the values of W and b that\n' +
          'make C as small as possible',
        vars: [
          { k: 'W*, b*', v: 'optimal weights and biases' },
          { k: 'argmin', v: 'returns the input that minimizes the function' },
          { k: 'w*',     v: 'location of the minimum on the curve' },
        ],
        note: 'Finding the exact minimum analytically is infeasible for large networks. We use gradient descent instead.',
      },
    },

    // Step 6
    {
      title: 'The Gradient Tells Us Which Way Is Downhill',
      desc: 'At any point on the curve, the <strong>slope</strong> (∂C/∂w) tells us how C changes when we nudge w. If the slope is <strong>positive</strong>, increasing w raises C — so we should <em>decrease</em> w to go downhill.',
      callout: null,
      scene: 'scene-loss-curve',
      lossCurve: {
        ballX: 621, ballY: 98,
        showMinMarker: true,
        showTangent: true,
        showGradientLabel: true,
        showStepArrow: false,
        showBallNew: false,
        showStepLabel: false,
      },
      formula: {
        concept: 'Gradient',
        heading: 'Slope of C at current w',
        code:
          '<span class="hl">∂C/∂w</span> = slope of C at current w\n\n' +
          'If ∂C/∂w <span class="hl">&gt; 0</span>:\n' +
          '  increasing w increases C\n' +
          '  → we should <span class="hl-green">decrease w</span>\n\n' +
          'If ∂C/∂w <span class="hl-blue">&lt; 0</span>:\n' +
          '  increasing w decreases C\n' +
          '  → we should <span class="hl-green">increase w</span>',
        vars: [
          { k: '∂C/∂w', v: 'partial derivative — rate of change of C w.r.t. w' },
        ],
        note: 'The gradient always points in the direction of steepest ascent. We go the opposite direction.',
      },
    },

    // Step 7
    {
      title: 'Gradient Descent: Take a Small Step Downhill',
      desc: 'Subtract a small multiple of the gradient from the current weight. The step size is controlled by the <strong>learning rate η</strong>. Repeat for every parameter, then repeat many times until C is small.',
      callout: null,
      scene: 'scene-loss-curve',
      lossCurve: {
        ballX: 621, ballY: 98,
        showMinMarker: true,
        showTangent: true,
        showGradientLabel: true,
        showStepArrow: true,
        showBallNew: true,
        showStepLabel: true,
      },
      formula: {
        concept: 'Gradient Descent',
        heading: 'Update rule for each parameter',
        code:
          '<span class="hl">w ← w − η · (∂C/∂w)</span>\n\n' +
          'After the step:\n' +
          '  w: 0.84 → 0.71   (moved left)\n' +
          '  C decreased ✓',
        vars: [
          { k: 'η',      v: 'learning rate — controls step size (e.g. 0.01)' },
          { k: '∂C/∂w',  v: 'gradient — direction to avoid' },
          { k: 'w ← …', v: 'assignment: replace w with updated value' },
        ],
        note: 'Too large η → overshoots the minimum. Too small η → very slow convergence. Choosing η well is an art.',
      },
    },

    // Step 8
    {
      title: 'In Practice, We Need a Gradient for Every Parameter',
      desc: 'Gradient descent requires <strong>∂C/∂wᵢ</strong> and <strong>∂C/∂bᵢ</strong> for every single parameter. This small network has 9 weights + 4 biases = 13 gradients. Large models have <em>billions</em> of parameters.',
      callout: {
        type: 'warning',
        text: 'Computing each gradient separately by perturbing one weight at a time is far too slow for large networks. We need a smarter method.',
      },
      scene: 'scene-nn',
      nn: {
        edges: ['default','default','default','default','default','default','default','default','default'],
        nodes: ['input','input','default','default','default','default'],
        showWeightLabels: false,
        showGradientLabels: true,
        showValues: false,
        showTrueLabel: false,
        showErrorLabel: false,
        showBackwardArrows: false,
        showBackpropLabel: false,
      },
      formula: {
        concept: 'Gradient Requirement',
        heading: 'One gradient per parameter',
        code:
          'Need:\n' +
          '  <span class="hl">∂C/∂w₁, ∂C/∂w₂, …, ∂C/∂w₉</span>\n' +
          '  <span class="hl">∂C/∂b₁, ∂C/∂b₂, ∂C/∂b₃, ∂C/∂b₄</span>\n\n' +
          'This network:  9 + 4 = 13 gradients\n' +
          'GPT-3:         175,000,000,000 params\n' +
          'GPT-4:         ~1,800,000,000,000 params',
        vars: [
          { k: '∂C/∂wᵢ', v: 'gradient of cost w.r.t. weight i' },
          { k: '∂C/∂bᵢ', v: 'gradient of cost w.r.t. bias i' },
        ],
        note: 'Numerical differentiation (perturbing each weight) costs O(params) forward passes — completely intractable at scale.',
      },
    },

    // Step 9
    {
      title: 'Backpropagation: All Gradients in One Backward Pass',
      desc: '<strong>Backpropagation</strong> uses the chain rule of calculus. The error at the output flows <em>backward</em> through the network. One backward pass computes <strong>all</strong> gradients simultaneously — making training tractable.',
      callout: {
        type: 'success',
        text: 'One forward pass + one backward pass = gradients for every weight and bias. That\'s what makes training tractable.',
      },
      scene: 'scene-nn',
      nn: {
        edges: ['dim','dim','dim','dim','dim','dim','dim','dim','dim'],
        nodes: ['input','input','done','done','done','done'],
        showWeightLabels: false,
        showGradientLabels: true,
        showValues: false,
        showTrueLabel: false,
        showErrorLabel: false,
        showBackwardArrows: true,
        showBackpropLabel: true,
      },
      formula: {
        concept: 'Backpropagation',
        heading: 'Chain rule applied recursively',
        code:
          '<span class="hl-pink">∂C/∂wᵢⱼ</span> = (∂C/∂hⱼ) · (∂hⱼ/∂wᵢⱼ)\n\n' +
          'Decompose with chain rule:\n' +
          '  ∂C/∂hⱼ  = Σₖ (∂C/∂hₖ) · (∂hₖ/∂hⱼ)\n\n' +
          'Reuse already-computed gradients\n' +
          'as error flows left ←',
        vars: [
          { k: '∂C/∂wᵢⱼ', v: 'gradient of cost w.r.t. weight from i to j' },
          { k: '∂hⱼ/∂wᵢⱼ', v: 'local gradient (easy to compute)' },
          { k: '∂C/∂hⱼ',   v: 'upstream gradient (passed back from right)' },
        ],
        note: 'Backprop = dynamic programming applied to gradient computation via the chain rule.',
      },
    },

    // Step 10
    {
      title: 'One Complete Training Step',
      desc: 'Every iteration of training runs 4 phases. After enough iterations, C becomes small and the network\'s predictions are good. <strong>Backprop computes the gradient. Gradient descent uses it.</strong>',
      callout: {
        type: 'info',
        text: 'Backprop computes the gradient. Gradient descent uses it. Together they are the engine of neural network training.',
      },
      scene: 'scene-training-loop',
      formula: {
        concept: 'Training Loop',
        heading: 'Full pseudocode',
        code:
          'initialize W, b randomly\n\n' +
          '<span class="hl-blue">for</span> epoch in 1..max_epochs:\n' +
          '  ∇W, ∇b ← 0\n' +
          '  <span class="hl-blue">for</span> (x, y) in dataset:\n\n' +
          '    <span class="hl-blue">1.</span> ŷ = forward(x, W, b)\n\n' +
          '    <span class="hl">2.</span> C = loss(ŷ, y)\n\n' +
          '    <span class="hl-pink">3.</span> ∇W, ∇b += backprop(C)\n\n' +
          '  <span class="hl-green">4.</span> W ← W − η·∇W\n' +
          '     b ← b − η·∇b',
        vars: [
          { k: 'epoch',    v: 'one full pass through the training data' },
          { k: '∇W, ∇b',  v: 'gradients of C w.r.t. all W and b' },
          { k: 'η',        v: 'learning rate (hyperparameter)' },
        ],
        note: 'Stop when C is below a threshold, or when validation accuracy stops improving.',
      },
    },
  ];

  // ── DOM refs ────────────────────────────────────────────────────
  const progressBarInner = document.getElementById('progress-bar-inner');

  const btnNext = document.getElementById('btn-next');

  // NN element refs
  const NN_EDGES = [0,1,2,3,4,5,6,7,8].map(i => document.getElementById('nn-e'+i));
  const NN_NODES = [
    document.getElementById('nn-n-in0'),
    document.getElementById('nn-n-in1'),
    document.getElementById('nn-n-hid0'),
    document.getElementById('nn-n-hid1'),
    document.getElementById('nn-n-hid2'),
    document.getElementById('nn-n-out'),
  ];
  const NN_VALS = [0,1,2,3,4,5].map(i => document.getElementById('nn-val'+i));

  function el(id) { return document.getElementById(id); }

  // ── Show/hide scene ─────────────────────────────────────────────
  function showScene(name) {
    SCENES.forEach(s => {
      const g = el(s);
      if (g) g.setAttribute('display', s === name ? '' : 'none');
    });
  }

  // ── Apply NN state ──────────────────────────────────────────────
  function applyNNState(state) {
    // Edges
    state.edges.forEach((etype, i) => {
      const e = NN_EDGES[i];
      if (!e) return;
      const st = EDGE_STYLES[etype] || EDGE_STYLES['default'];
      e.setAttribute('stroke', st.stroke);
      e.setAttribute('stroke-width', st.sw);
      e.setAttribute('stroke-dasharray', st.dash);
    });

    // Nodes
    const nodeIds = ['nn-n-in0','nn-n-in1','nn-n-hid0','nn-n-hid1','nn-n-hid2','nn-n-out'];
    state.nodes.forEach((ntype, i) => {
      const circle = NN_NODES[i];
      if (!circle) return;
      const st = NODE_STYLES[ntype] || NODE_STYLES['default'];
      circle.setAttribute('fill', st.fill);
      circle.setAttribute('stroke', st.stroke);
      circle.setAttribute('stroke-width', st.sw);
    });

    // Toggle groups
    function tog(id, show) {
      const g = el(id);
      if (g) g.setAttribute('display', show ? '' : 'none');
    }

    tog('nn-weight-labels',    state.showWeightLabels);
    tog('nn-gradient-labels',  state.showGradientLabels);
    tog('nn-true-label',       state.showTrueLabel);
    tog('nn-error-label',      state.showErrorLabel);
    tog('nn-backward-arrows',  state.showBackwardArrows);
    tog('nn-backprop-label',   state.showBackpropLabel);

    // Value annotations
    NN_VALS.forEach((vg, i) => {
      if (vg) vg.setAttribute('display', state.showValues ? '' : 'none');
    });
  }

  // ── Apply loss curve state ───────────────────────────────────────
  function applyLossCurveState(state) {
    function tog(id, show) {
      const g = el(id);
      if (g) g.setAttribute('display', show ? '' : 'none');
    }

    // Ball position
    const ball = el('loss-ball');
    if (ball) {
      ball.setAttribute('cx', state.ballX);
      ball.setAttribute('cy', state.ballY);
    }

    tog('loss-min-marker',      state.showMinMarker);
    tog('loss-tangent',         state.showTangent);
    tog('loss-gradient-label',  state.showGradientLabel);
    tog('loss-step-arrow',      state.showStepArrow);
    tog('loss-ball-new',        state.showBallNew);
    tog('loss-step-label',      state.showStepLabel);
  }

  // ── Build formula panel HTML ─────────────────────────────────────
  function buildFormula(f) {
    let html = '';

    html += '<div>';
    html += '<span class="f-concept">' + f.concept + '</span>';
    html += '<div class="f-heading">' + f.heading + '</div>';
    html += '</div>';

    html += '<div class="f-formula">' + f.code + '</div>';

    if (f.vars && f.vars.length > 0) {
      html += '<hr class="f-divider">';
      html += '<ul class="f-vars">';
      f.vars.forEach(v => {
        html += '<li><span class="vk">' + v.k + '</span><span>' + v.v + '</span></li>';
      });
      html += '</ul>';
    }

    if (f.note) {
      html += '<hr class="f-divider">';
      html += '<div class="f-note">' + f.note + '</div>';
    }

    return html;
  }

  // ── Apply step ───────────────────────────────────────────────────
  let currentStep = 0;

  function applyStep(idx) {
    const step = STEPS[idx];

    // Progress bar
    const pct = (idx / (TOTAL_STEPS - 1)) * 100;
    progressBarInner.style.width = pct + '%';
    progressBarInner.parentElement.setAttribute('aria-valuenow', idx);

    // Header counter
    headerStepCounter.textContent = 'Step ' + (idx + 1) + ' / ' + TOTAL_STEPS;

    // Description bar
    stepTitleEl.textContent = step.title;
    stepDescEl.innerHTML = step.desc;

    // Callout
    calloutBox.className = '';
    calloutBox.textContent = '';
    calloutBox.style.display = 'none';
    if (step.callout) {
      calloutBox.className = step.callout.type;
      calloutBox.textContent = step.callout.text;
      calloutBox.style.display = '';
    }

    // Footer counter
    footerCounter.textContent = (idx + 1) + ' / ' + TOTAL_STEPS;

    // Buttons
    btnPrev.disabled = idx === 0;
    btnNext.disabled = idx === TOTAL_STEPS - 1;

    // Show scene
    showScene(step.scene);

    // Apply scene-specific state
    if (step.scene === 'scene-nn' && step.nn) {
      applyNNState(step.nn);
    }
    if (step.scene === 'scene-loss-curve' && step.lossCurve) {
      applyLossCurveState(step.lossCurve);
    }

    // Formula panel
    formulaPanel.innerHTML = buildFormula(step.formula);
  }

  // ── Navigation ───────────────────────────────────────────────────
  function goTo(idx) {
    if (idx < 0 || idx >= TOTAL_STEPS) return;
    currentStep = idx;
    applyStep(currentStep);
  }

  btnPrev.addEventListener('click', () => goTo(currentStep - 1));
  btnNext.addEventListener('click', () => goTo(currentStep + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentStep + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); goTo(currentStep - 1); }
  });

  // ── Init ─────────────────────────────────────────────────────────
  goTo(0);

})();
</script>
</body>
</html>
